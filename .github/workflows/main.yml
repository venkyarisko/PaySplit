name: Build Android APK

on:
  push:
    branches: [ 'main' ]
    tags: [ 'v*' ] # Memicu release jika push tag seperti v1.2.0
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Izin untuk membuat release
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor Android
        run: |
          npx cap sync
          
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/paysplit-key.jks

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Prepare APK for Release
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk PaySplit.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaySplit-Release-APK
          path: PaySplit.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PaySplit.apk
          name: Release ${{ github.ref_name }}
          body: "Silakan download file PaySplit.apk di bawah untuk menginstall versi terbaru."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


